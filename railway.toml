[build]
builder = "DOCKERFILE"
# Dockerfile expects monorepo root as build context (we copy from
# apps/docs/ inside the file). railway up --dir . uploads root.
dockerfilePath = "apps/docs/Dockerfile"

[deploy]
# startCommand omitted on purpose — Dockerfile CMD wraps next start
# in `sh -c` so $PORT expands. Setting startCommand here would
# override CMD and Railway doesn't shell-expand the value, so next
# saw the literal "$PORT" and crashed.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
